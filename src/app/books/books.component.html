<h1 class="page-title">Books List</h1>

<section class="actions">
  <div>
    <button matButton="filled" type="button" (click)="fileInput.click()">
      Upload file with library
    </button>
  </div>
  <div>
    <button matButton="filled" extended (click)="addBook()">
      <mat-icon>control_point</mat-icon>
      Add a new book
    </button>
  </div>
</section>

<section>
  <input
    type="file"
    #fileInput
    style="display: none"
    (change)="onFileSelected($event)"
    accept=".xml"
  />
</section>

<section class="empty-list">
  @if (!books().length) {
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title> There are no books to display.</mat-card-title>
        <mat-card-subtitle
          >Please add a book or upload an XML file with books from your
          computer.</mat-card-subtitle
        >
      </mat-card-header>
    </mat-card>
  }
</section>

@if (books().length) {
  <app-books-list
    [books]="books()"
    (selectBook)="selectBook($event)"
  ></app-books-list>

  <section class="download-section">
    <button matButton="filled" type="button" (click)="convertAndSaveXml()">
      Save books and download XML file
    </button>
  </section>
}
